worker_processes  1;

events {
    worker_connections  1024;
}

rtmp {
    server {
        listen 1936;
        chunk_size 4096;

        # Application: receive webcam inputs
        application input {
            live on;
            record off;
            allow publish all;
            allow play 127.0.0.1;
        }

        
        application hls {
            live on;
            hls on;
            hls_path temp/tmp_hls;
            
            hls_continuous on;

            hls_fragment 2s;
            hls_playlist_length 20m; 
            
            hls_cleanup on;
            hls_nested on;

            # HLS variant definitions for the player
            hls_variant _low BANDWIDTH=400000,RESOLUTION=426x240;
            hls_variant _mid BANDWIDTH=800000,RESOLUTION=854x480;
            hls_variant _src BANDWIDTH=3000000,RESOLUTION=1280x720;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        listen       443 ssl; # HTTPS
        server_name  localhost;

        ssl_certificate      ssl/cert.pem;
        ssl_certificate_key  ssl/key.pem;

        root site;
        index index.html;

        location /stats {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            add_header Refresh "3; $request_uri";
        }

        location /stat.xsl {
            root site;
        }

        location /hls {
            alias temp/tmp_hls;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Cache-Control' 'no-cache';
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}